<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeTubeX - Dashboard</title>

<!-- Firebase SDK (compat version pour GitHub Pages) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
  body { font-family: Arial, sans-serif; text-align:center; margin:20px; }
  #dashboard, #offerwall { display:none; margin-top:20px; }
  input { padding:8px; margin:5px; width:200px; }
  button { padding:10px 20px; }
</style>
</head>
<body>

<h2>NeTubeX Login</h2>

<!-- Formulaire login -->
<div id="loginForm">
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Mot de passe"><br>
  <button id="loginBtn">Se connecter</button>
  <div id="loginError" style="color:red; margin-top:10px;"></div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <h3>Bienvenue sur votre dashboard</h3>
  <p>User ID : <span id="userIDSpan"></span></p>
  <button id="logoutBtn">Se déconnecter</button>

  <!-- Iframe Timewall -->
  <iframe id="offerwall" style="width:100%; height:600px; border:none;"></iframe>
</div>

<script>
  // Config Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
    authDomain: "netubexmoney.firebaseapp.com",
    projectId: "netubexmoney",
    storageBucket: "netubexmoney.firebasestorage.app",
    messagingSenderId: "856592608176",
    appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Login
  document.getElementById("loginBtn").addEventListener("click", () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(userCredential => {
        document.getElementById("loginError").innerText = "";
        console.log("User connecté :", userCredential.user.uid);
      })
      .catch(error => {
        document.getElementById("loginError").innerText = "Erreur login : " + error.message;
      });
  });

  // Détecter si l'utilisateur est connecté
  auth.onAuthStateChanged(user => {
    if(user){
      const userID = user.uid;
      document.getElementById("userIDSpan").innerText = userID;

      // Afficher dashboard et iframe
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("dashboard").style.display = "block";

      // Injecter userID dans l'iframe Timewall
      const iframe = document.getElementById("offerwall");
      iframe.src = "https://timewall.io/users/login?oid=e9bb1fdfd1ed93a0&uid=" + userID;

    } else {
      // Aucun user connecté
      document.getElementById("loginForm").style.display = "block";
      document.getElementById("dashboard").style.display = "none";
    }
  });

  // Logout
  document.getElementById("logoutBtn").addEventListener("click", () => {
    auth.signOut();
  });
</script>

</body>
</html>
