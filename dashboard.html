<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeTubeX Login + Dashboard</title>
</head>
<body>

<div id="loginContainer">
  <h2>Connexion NeTubeX</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Mot de passe">
  <button id="loginBtn">Se connecter</button>
  <div id="error" style="color:red;"></div>
</div>

<div id="dashboardContainer" style="display:none;">
  <h2>Dashboard</h2>
  <iframe id="offerwall" style="width:100%; height:600px;"></iframe>
  <button id="logoutBtn">Déconnexion</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC2Covw6v6PI7AbItSGVO90z-JrrMCxC_I",
    authDomain: "netubexmoney.firebaseapp.com",
    projectId: "netubexmoney",
    storageBucket: "netubexmoney.firebasestorage.app",
    messagingSenderId: "856592608176",
    appId: "1:856592608176:web:06cc2815cd8a1be0630475"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  const loginContainer = document.getElementById("loginContainer");
  const dashboardContainer = document.getElementById("dashboardContainer");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const errorDiv = document.getElementById("error");
  const iframe = document.getElementById("offerwall");

  // Surveille connexion Firebase
  auth.onAuthStateChanged(user => {
    if(user){
      // Affiche dashboard
      loginContainer.style.display = "none";
      dashboardContainer.style.display = "block";

      // Injecte userID dans l'iframe Timewall
      const userID = user.uid;
      iframe.src = "https://timewall.io/users/login?oid=e9bb1fdfd1ed93a0&uid=" + userID;
    } else {
      // Affiche login
      loginContainer.style.display = "block";
      dashboardContainer.style.display = "none";
    }
  });

  // Bouton login
  loginBtn.addEventListener("click", () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    if(!email || !password){
      errorDiv.textContent = "Veuillez remplir tous les champs";
      return;
    }

    auth.signInWithEmailAndPassword(email, password)
      .catch(error => {
        if(error.code === "auth/user-not-found"){
          errorDiv.textContent = "Utilisateur inexistant";
        } else if(error.code === "auth/wrong-password"){
          errorDiv.textContent = "Mot de passe incorrect";
        } else {
          errorDiv.textContent = error.message;
        }
      });
  });

  // Bouton logout
  logoutBtn.addEventListener("click", () => auth.signOut());

</script>
</body>
</html>
