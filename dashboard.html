<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Timewall</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

</head>
<body style="text-align:center; margin:20px;">

<h2>Connexion</h2>

<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Mot de passe"><br>
<button id="loginBtn">Se connecter</button>
<div id="error" style="color:red; margin-top:10px;"></div>

<br><br>

<iframe id="offerwall" style="width:100%; height:600px; border:1px solid #000; display:none;"></iframe>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
    authDomain: "netubexmoney.firebaseapp.com",
    projectId: "netubexmoney",
    storageBucket: "netubexmoney.firebasestorage.app",
    messagingSenderId: "856592608176",
    appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Login
  document.getElementById("loginBtn").addEventListener("click", () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(userCredential => {
        console.log("User connecté :", userCredential.user.uid);
        document.getElementById("error").innerText = "";
      })
      .catch(error => {
        document.getElementById("error").innerText = "Erreur login : " + error.message;
      });
  });

  // Détecter si user est connecté
  auth.onAuthStateChanged(user => {
    if(user){
      const userID = user.uid;
      console.log("UserID pour Timewall :", userID);

      const iframe = document.getElementById("offerwall");
      iframe.style.display = "block";
      iframe.src = "https://timewall.io/users/login?oid=e9bb1fdfd1ed93a0&uid=" + userID;

    } else {
      document.getElementById("offerwall").style.display = "none";
    }
  });
</script>

</body>
</html>
