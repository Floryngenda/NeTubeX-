<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>NeTubeX - Login</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="login-container">
    <h2>Connexion NeTubeX</h2>
    <input type="text" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">
    <button id="loginBtn">Se connecter</button>
    <p id="message"></p>
  </div>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
      authDomain: "netubexmoney.firebaseapp.com",
      projectId: "netubexmoney",
      storageBucket: "netubexmoney.firebasestorage.app",
      messagingSenderId: "856592608176",
      appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
    };

    // Initialize Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const loginBtn = document.getElementById("loginBtn");
    const message = document.getElementById("message");

    loginBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if(!email || !password){
        message.textContent = "Remplissez tous les champs !";
        return;
      }

      try {
        const querySnapshot = await db.collection("users")
          .where("email", "==", email)
          .where("password", "==", password)
          .get();

        if(querySnapshot.empty){
          message.textContent = "Email ou mot de passe incorrect.";
          return;
        }

        // Récupérer le user
        const userDoc = querySnapshot.docs[0].data();
        if(userDoc.isAdmin){
          // Rediriger vers dashboard
          window.location.href = "dashboard.html";
        } else {
          message.textContent = "Vous n'avez pas accès à l'administration.";
        }

      } catch (err) {
        console.error(err);
        message.textContent = "Erreur lors de la connexion.";
      }
    });
  </script>
</body>
</html>
