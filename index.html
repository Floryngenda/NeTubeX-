<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeTubeX · Accueil</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:'Inter',sans-serif;
      background:linear-gradient(145deg,#0b0f1c,#0a0e1a);
      color:#f0f3fc;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    header{
      padding:1rem 2rem;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(18,22,35,0.85);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(72,120,255,0.25);
    }

    nav a{
      color:#7b9eff;
      margin-left:1rem;
      text-decoration:none;
      font-weight:600;
    }

    header button{
      background:linear-gradient(100deg,#3b5ef5,#6d3aff);
      border:none;
      border-radius:2rem;
      padding:0.5rem 1rem;
      color:white;
      cursor:pointer;
    }

    main{
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:2rem;
    }

    h1{font-size:2rem;margin-bottom:1rem;}

    .main-btn{
      padding:1rem 2rem;
      border:none;
      border-radius:2rem;
      background:linear-gradient(100deg,#3b5ef5,#6d3aff);
      color:white;
      cursor:pointer;
    }

    footer{
      text-align:center;
      padding:1rem;
      font-size:0.75rem;
      color:#4c5470;
    }

    /* POPUP */
    .modal{
      display:none;
      position:fixed;
      width:100%;
      height:100%;
      top:0;
      left:0;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#121623;
      padding:2rem;
      border-radius:1.5rem;
      width:90%;
      max-width:400px;
      text-align:center;
    }

    .modal-content input{
      width:100%;
      margin:0.5rem 0;
      padding:0.8rem;
      border-radius:1rem;
      border:none;
      background:#0e1224;
      color:white;
    }

    .modal-content button{
      width:100%;
      margin-top:1rem;
      padding:0.8rem;
      border:none;
      border-radius:1rem;
      background:linear-gradient(100deg,#3b5ef5,#6d3aff);
      color:white;
    }
  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>

<body>

<header>
  <div>NeTubeX</div>

  <nav>
    <a href="index.html">Accueil</a>
    <a href="pets/">PETS</a>
    <a href="pgco/">PGCO</a>
    <a href="pilote/">Pilote</a>
    <a href="apropos/">À propos</a>
  </nav>

  <button onclick="openModal()">Connexion</button>
</header>

<main>
  <h1>Bienvenue sur NeTubeX</h1>
  <p>Un espace de rémunération digitale pour tous.</p>

  <button class="main-btn"
    onclick="window.location.href='https://wa.me/243808359598'">
    Postulez maintenant
  </button>
</main>

<footer>
  © NeTubeX — expérience immersive
</footer>

<!-- POPUP -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Connexion</h2>
    <input type="text" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
  </div>
</div>

<script>
  // POPUP
  function openModal(){
    document.getElementById("modal").style.display="flex";
  }

  // FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "netubexmoney.firebaseapp.com",
    projectId: "netubexmoney",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // LOGIN
  async function login(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    const query = await db.collection("users")
      .where("email","==",email)
      .where("password","==",password)
      .get();

    if(query.empty){
      alert("Identifiants incorrects");
      return;
    }

    const user = query.docs[0].data();

    // REDIRECTION
    if(user.isAdmin){
      window.location.href = "admin/";
    } else {
      window.location.href = "dashboard/";
    }
  }
</script>

</body>
</html>
